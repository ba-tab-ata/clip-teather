<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 클립극장</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
  --text: #e2e8f0; --muted: #94a3b8; --dim: #64748b;
  --accent: #f59e0b; --accent2: #d97706;
  --green: #22c55e; --purple: #8b5cf6; --red: #f43f5e;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',sans-serif; background:linear-gradient(180deg,var(--bg),#1a1a2e); color:var(--text); min-height:100vh; }
button,input,select,textarea { font-family:'Noto Sans KR',sans-serif; }
button { cursor:pointer; }

.header { background:linear-gradient(135deg,#1a0a2e,#16213e 50%,#0f3460); border-bottom:2px solid rgba(245,158,11,.2); position:sticky; top:0; z-index:100; }
.header-inner { max-width:1100px; margin:0 auto; padding:12px 20px 0; }
.header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.logo { display:flex; align-items:center; gap:10px; }
.logo h1 { font-family:'Black Han Sans',sans-serif; font-size:26px; color:var(--accent); letter-spacing:2px; text-shadow:0 0 20px rgba(245,158,11,.25); }
.stats { font-size:13px; color:var(--muted); display:flex; gap:16px; }
.stats b { color:var(--accent); }
.stats .uw b { color:var(--green); }
.tabs { display:flex; }
.tab-btn { background:transparent; border:none; border-bottom:3px solid transparent; color:var(--muted); font-weight:400; font-size:14px; padding:10px 18px; transition:all .2s; }
.tab-btn.active { background:rgba(245,158,11,.08); border-bottom-color:var(--accent); color:var(--accent); font-weight:700; }
.tab-btn:hover:not(.active) { color:var(--text); }

.main { max-width:1100px; margin:0 auto; padding:20px 20px 60px; }

.setup-banner { background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(245,158,11,.04)); border:1.5px solid rgba(245,158,11,.3); border-radius:14px; padding:20px 24px; margin-bottom:20px; text-align:center; }
.setup-banner h3 { color:var(--accent); font-size:16px; margin-bottom:8px; }
.setup-banner p { color:var(--muted); font-size:13px; line-height:1.6; margin-bottom:12px; }
.setup-banner input { background:var(--bg); border:1px solid var(--bg3); border-radius:8px; color:var(--text); padding:10px 14px; font-size:13px; width:100%; max-width:600px; }
.setup-banner .sbtn { background:var(--accent); border:none; color:#000; border-radius:8px; padding:10px 24px; font-weight:700; font-size:14px; margin-top:8px; }

.cat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(95px,1fr)); gap:10px; margin-bottom:24px; }
.cat-card { background:rgba(30,41,59,.5); border:1.5px solid var(--bg3); border-radius:14px; padding:14px 10px; display:flex; flex-direction:column; align-items:center; gap:4px; transition:all .25s; }
.cat-card:hover { transform:translateY(-3px) scale(1.03); }
.cat-card.active { border-color:var(--accent); background:rgba(245,158,11,.08); }
.cat-card .em { font-size:28px; }
.cat-card .nm { font-weight:700; font-size:14px; }
.cat-card .ct { font-size:11px; color:var(--dim); }

.dur-bar { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; justify-content:center; }
.dur-btn { background:var(--bg2); border:1px solid var(--bg3); color:var(--muted); border-radius:20px; padding:5px 14px; font-size:12px; transition:all .2s; }
.dur-btn.active { background:#06b6d4; color:#fff; border-color:#06b6d4; font-weight:700; }

.clip-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
.clip-card { background:var(--bg2); border:1px solid var(--bg3); border-radius:12px; overflow:hidden; transition:all .2s; }
.clip-card.watched { opacity:.45; }
.clip-card .thumb { position:relative; aspect-ratio:16/9; background:var(--bg); cursor:pointer; overflow:hidden; }
.clip-card .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.clip-card .thumb .pov { position:absolute; inset:0; background:rgba(0,0,0,.3); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; font-size:40px; }
.clip-card .thumb:hover .pov { opacity:1; }
.dbadge { position:absolute; top:4px; right:4px; background:rgba(0,0,0,.82); color:#fff; font-size:11px; padding:3px 7px; border-radius:5px; font-family:monospace; font-weight:700; letter-spacing:.5px; }
.wbadge { position:absolute; bottom:4px; left:4px; background:rgba(0,0,0,.82); color:var(--green); font-size:10px; padding:2px 6px; border-radius:4px; }
.clip-card .info { padding:10px 12px; }
.clip-card .ttl { font-size:13px; font-weight:600; margin-bottom:6px; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; line-height:1.4; }
.clip-card .meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.ctag { font-size:11px; padding:2px 8px; border-radius:20px; }
.clip-card .acts { margin-left:auto; display:flex; gap:4px; }
.clip-card .acts button { background:none; border:none; font-size:15px; padding:2px; opacity:.5; transition:opacity .2s; cursor:pointer; }
.clip-card .acts button:hover { opacity:1; }

.clip-cpt { display:flex; background:var(--bg2); border:1px solid var(--bg3); border-radius:10px; overflow:hidden; transition:all .2s; }
.clip-cpt:hover { border-color:#475569; }
.clip-cpt.watched { opacity:.45; }
.clip-cpt .tsm { width:150px; min-height:85px; flex-shrink:0; background:var(--bg); position:relative; cursor:pointer; }
.clip-cpt .tsm img { width:100%; height:100%; object-fit:cover; }
.clip-cpt .info { padding:8px 12px; flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center; }
.clip-cpt .info-row { display:flex; align-items:center; gap:6px; margin-top:4px; }
.clip-cpt .info-left { display:flex; align-items:center; gap:6px; flex:1; min-width:0; flex-wrap:wrap; }
.clip-cpt .info-right { display:flex; align-items:center; gap:2px; flex-shrink:0; margin-left:auto; }
.clip-cpt .info-right button {
  background:none; border:1px solid transparent; font-size:18px; padding:4px 6px;
  border-radius:6px; transition:all .15s; cursor:pointer; line-height:1;
}
.clip-cpt .info-right button:hover { background:rgba(255,255,255,.08); border-color:#475569; }
.clip-cpt .info-right .btn-check { opacity:.5; }
.clip-cpt .info-right .btn-check.on { opacity:1; }
.clip-cpt .info-right .btn-del { opacity:.35; }
.clip-cpt .info-right .btn-del:hover { opacity:.8; background:rgba(244,63,94,.12); border-color:rgba(244,63,94,.3); }
.clip-cpt .info-right .btn-edit { opacity:.35; font-size:14px; }
.clip-cpt .info-right .btn-edit:hover { opacity:.8; background:rgba(245,158,11,.12); border-color:rgba(245,158,11,.3); }

.edit-form { background:var(--bg2); border:1.5px solid var(--accent); border-radius:10px; padding:14px; margin-bottom:2px; }
.edit-form .ef-row { display:flex; gap:6px; margin-bottom:6px; align-items:center; flex-wrap:wrap; }
.edit-form .ef-label { font-size:11px; color:var(--dim); min-width:50px; flex-shrink:0; }
.edit-form .ef-inp { background:var(--bg); border:1px solid var(--bg3); border-radius:6px; color:var(--text); padding:7px 10px; font-size:13px; flex:1; min-width:0; }
.edit-form .ef-inp:focus { border-color:var(--accent); outline:none; }
.edit-form .ef-sel { background:var(--bg); border:1px solid var(--bg3); border-radius:6px; color:var(--text); padding:7px 10px; font-size:13px; }
.edit-form .ef-btns { display:flex; gap:6px; margin-top:8px; justify-content:flex-end; }
.edit-form .ef-save { background:var(--accent); border:none; color:#000; border-radius:6px; padding:7px 16px; font-size:13px; font-weight:700; cursor:pointer; }
.edit-form .ef-cancel { background:var(--bg3); border:none; color:var(--muted); border-radius:6px; padding:7px 16px; font-size:13px; cursor:pointer; }

.slot-box { background:linear-gradient(180deg,#1a0a2e,#16213e); border:2px solid rgba(245,158,11,.2); border-radius:20px; padding:40px 20px; text-align:center; box-shadow:0 0 60px rgba(245,158,11,.06),inset 0 0 60px rgba(0,0,0,.3); margin-bottom:24px; }
.slot-title { font-family:'Black Han Sans',sans-serif; font-size:22px; color:var(--accent); margin-bottom:24px; text-shadow:0 0 20px rgba(245,158,11,.25); }
.slot-display { min-height:200px; display:flex; align-items:center; justify-content:center; margin-bottom:24px; }
.scard { background:var(--bg); border:2px solid var(--bg3); border-radius:16px; overflow:hidden; max-width:400px; width:100%; transition:all .3s; }
.scard.spin { border-color:rgba(245,158,11,.5); box-shadow:0 0 30px rgba(245,158,11,.25); animation:pulse .15s infinite alternate; }
.scard.done { border-color:rgba(34,197,94,.5); box-shadow:0 0 30px rgba(34,197,94,.15); }
@keyframes pulse { from{transform:scale(1)} to{transform:scale(1.02)} }

.bbtn { border:none; border-radius:12px; padding:14px 36px; font-size:17px; font-family:'Black Han Sans',sans-serif; letter-spacing:2px; transition:all .2s; }
.bbtn.gold { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#000; box-shadow:0 4px 20px rgba(245,158,11,.25); }
.bbtn.grn { background:linear-gradient(135deg,var(--green),#16a34a); color:#fff; box-shadow:0 4px 20px rgba(34,197,94,.25); font-family:'Noto Sans KR',sans-serif; font-weight:700; }
.bbtn.pur { background:linear-gradient(135deg,var(--purple),#7c3aed); color:#fff; box-shadow:0 4px 20px rgba(139,92,246,.25); }
.bbtn:disabled { background:var(--bg3); color:var(--muted); box-shadow:none; cursor:not-allowed; }

.stbox { background:linear-gradient(180deg,#1a0a2e,#16213e); border:2px solid rgba(139,92,246,.2); border-radius:20px; padding:40px 24px; text-align:center; box-shadow:0 0 60px rgba(139,92,246,.06),inset 0 0 60px rgba(0,0,0,.3); max-width:500px; margin:0 auto; }
.stnum { font-size:90px; font-family:'Black Han Sans',sans-serif; min-height:120px; display:flex; align-items:center; justify-content:center; transition:color .3s; }
.stnum.spin { color:var(--accent); animation:pulse .1s infinite alternate; }
.stnum.done { color:var(--green); text-shadow:0 0 40px rgba(34,197,94,.25); }
.stnum.idle { color:var(--bg3); }
.htags { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
.htag { background:rgba(139,92,246,.12); color:var(--purple); border-radius:8px; padding:4px 10px; font-family:'Black Han Sans',sans-serif; font-size:15px; }

.aform { background:var(--bg2); border:1px solid var(--bg3); border-radius:16px; padding:20px; margin-bottom:20px; }
.aform h3 { font-size:16px; margin-bottom:16px; }
.frow { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.finp { background:var(--bg); border:1px solid var(--bg3); border-radius:8px; color:var(--text); padding:10px 12px; font-size:14px; flex:1; min-width:0; }
.finp::placeholder { color:var(--dim); }
.fsel { background:var(--bg); border:1px solid var(--bg3); border-radius:8px; color:var(--text); padding:10px 12px; font-size:14px; }
.fbtn { border:none; border-radius:8px; padding:10px 20px; font-weight:700; font-size:14px; }
.fbtn.pri { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#000; }
.fbtn.sec { background:var(--bg3); color:var(--muted); }
.errmsg { color:var(--red); font-size:13px; margin-top:4px; }
.lctrls { display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }

.empty { text-align:center; padding:60px 20px; color:var(--dim); }
.empty .em { font-size:48px; display:block; margin-bottom:12px; }
.hidden { display:none !important; }
.lspin { display:inline-block; width:18px; height:18px; border:2px solid var(--bg3); border-top-color:var(--accent); border-radius:50%; animation:sp .6s linear infinite; margin-right:6px; vertical-align:middle; }
@keyframes sp { to{transform:rotate(360deg)} }

@media(max-width:640px) {
  .logo h1 { font-size:20px; }
  .tab-btn { padding:8px 12px; font-size:12px; }
  .cat-grid { grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:8px; }
  .clip-grid { grid-template-columns:1fr; }
  .stnum { font-size:64px; }
}
</style>
</head>
<body>
<div class="header"><div class="header-inner">
  <div class="header-top">
    <div class="logo"><span style="font-size:28px">🎬</span><h1>클립극장</h1></div>
    <div class="stats"><span>전체 <b id="st-t">0</b>편</span><span class="uw">안 본 영상 <b id="st-u">0</b>편</span><span id="sync-ind" class="hidden" style="color:var(--accent);font-size:11px"><span class="lspin" style="width:12px;height:12px;border-width:1.5px;margin-right:3px"></span>동기화 중</span></div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-v="theater">🎬 클립극장</button>
    <button class="tab-btn" data-v="pick">🎰 클립뽑기</button>
    <button class="tab-btn" data-v="student">🎯 번호뽑기</button>
    <button class="tab-btn" data-v="manage">⚙️ 관리</button>
  </div>
</div></div>

<div class="main">
  <div class="setup-banner" id="setup">
    <h3>📋 처음 사용 세팅</h3>
    <p>구글 스프레드시트와 연결해주세요. 세팅 방법은 함께 제공된 가이드를 참고하세요.</p>
    <input type="text" id="api-inp" placeholder="Apps Script 웹 앱 URL을 여기에 붙여넣기"><br>
    <button class="sbtn" onclick="saveUrl()">연결하기</button>
    <p style="margin-top:12px;font-size:11px;color:var(--dim)">연결 없이 체험 →
      <button onclick="enterDemo()" style="background:none;border:1px solid var(--bg3);color:var(--muted);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer">데모 모드</button>
    </p>
  </div>
  <div id="v-theater" class="vp"></div>
  <div id="v-pick" class="vp hidden"></div>
  <div id="v-student" class="vp hidden"></div>
  <div id="v-manage" class="vp hidden"></div>
</div>




<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  🎬 클립극장 설정 — 여기만 수정하세요!                  ║
// ╠══════════════════════════════════════════════════════════╣
// ║                                                          ║
// ║  아래 '' 안에 Apps Script 웹 앱 URL을 붙여넣으세요.      ║
// ║  비워두면 앱에서 직접 입력하는 화면이 나옵니다.          ║
// ║                                                          ║
const API_URL = 'https://script.google.com/macros/s/AKfycbynrCtgvj7atDrDdwHKXMVfdMkz64VZWHuntoS_GVj4Yv2LhVgQtXlvsObdVa5QePorew/exec';
// ║                                                          ║
// ║  예시:                                                   ║
// ║  const API_URL = 'https://script.google.com/macros/s/AKf...긴문자열.../exec'; ║
// ║                                                          ║
// ╚══════════════════════════════════════════════════════════╝

// Sound Effects (Web Audio API)
const SFX = (() => {
  let ctx;
  function getCtx() { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; }
  function tick(pitch) {
    try {
      const c = getCtx(), o = c.createOscillator(), g = c.createGain();
      o.type = 'sine';
      o.frequency.value = 300 + (pitch || 0) * 40;
      g.gain.setValueAtTime(0.08, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.08);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + 0.08);
    } catch {}
  }
  function win() {
    try {
      const c = getCtx();
      const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
      notes.forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'sine';
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.12, c.currentTime + i * 0.12);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.12 + 0.4);
        o.connect(g); g.connect(c.destination);
        o.start(c.currentTime + i * 0.12);
        o.stop(c.currentTime + i * 0.12 + 0.4);
      });
    } catch {}
  }
  function drumroll() {
    try {
      const c = getCtx();
      for (let i = 0; i < 12; i++) {
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'triangle';
        o.frequency.value = 180 + Math.random() * 60;
        const t = c.currentTime + i * 0.04;
        g.gain.setValueAtTime(0.04, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        o.connect(g); g.connect(c.destination);
        o.start(t); o.stop(t + 0.05);
      }
    } catch {}
  }
  return { tick, win, drumroll };
})();

const CATS=[
  {id:'animal',name:'동물',emoji:'🐾',color:'#F59E0B'},
  {id:'touching',name:'감동',emoji:'🥹',color:'#EC4899'},
  {id:'music',name:'음악',emoji:'🎵',color:'#8B5CF6'},
  {id:'science',name:'과학',emoji:'🔬',color:'#06B6D4'},
  {id:'history',name:'역사',emoji:'📜',color:'#D97706'},
  {id:'sports',name:'스포츠',emoji:'⚽',color:'#10B981'},
  {id:'art',name:'예술',emoji:'🎨',color:'#F43F5E'},
  {id:'nature',name:'자연',emoji:'🌿',color:'#22C55E'},
  {id:'tech',name:'기술',emoji:'🤖',color:'#6366F1'},
  {id:'fun',name:'재미',emoji:'😂',color:'#F97316'},
  {id:'food',name:'음식',emoji:'🍜',color:'#FB923C'},
  {id:'etc',name:'기타',emoji:'📦',color:'#78716C'},
];
const DURS=[
  {id:'all',label:'전체 시간',icon:'⏱️'},
  {id:'short',label:'3분 미만',icon:'⚡',min:0,max:3},
  {id:'medium',label:'3~5분',icon:'☕',min:3,max:5},
  {id:'long',label:'5~10분',icon:'🍿',min:5,max:10},
  {id:'extra',label:'10분+',icon:'🎞️',min:10,max:9999},
];

let S={clips:[],view:'theater',selCat:null,selDur:'all',apiUrl:API_URL||localStorage.getItem('ct_api')||'',demo:false,loading:false,
  pCat:null,pDur:'all',pRes:null,pSpin:false,
  sTotal:parseInt(localStorage.getItem('ct_stotal')||'30'),sRes:null,sSpin:false,sHist:[],sExcl:true,
  mCat:null,mW:'all',editId:null};

function gW(){try{return new Set(JSON.parse(localStorage.getItem('ct_w')||'[]'))}catch{return new Set()}}
function sW(s){localStorage.setItem('ct_w',JSON.stringify([...s]))}
function iW(id){return gW().has(id)}
function tW(id){const w=gW();w.has(id)?w.delete(id):w.add(id);sW(w);renderAll()}
function uid(){return Math.random().toString(36).slice(2,10)}
function exVid(u){if(!u)return null;const ps=[/youtube\.com\/watch\?v=([^&\s]+)/,/youtu\.be\/([^?\s]+)/,/youtube\.com\/embed\/([^?\s]+)/,/youtube\.com\/shorts\/([^?\s]+)/];for(const p of ps){const m=u.match(p);if(m)return m[1]}return null}
function pDur(s){if(!s)return 0;s=String(s).trim();const p=s.split(':').map(Number);if(p.length===2)return p[0]+p[1]/60;if(p.length===3)return p[0]*60+p[1]+p[2]/60;return parseFloat(s)||0}
function dIcon(s){const m=pDur(s);if(m<=0)return'';if(m<3)return'⚡';if(m<5)return'☕';if(m<10)return'🍿';return'🎞️'}
function mDur(c,fid){if(fid==='all')return true;const f=DURS.find(d=>d.id===fid);if(!f)return true;const m=pDur(c.duration);if(m<=0)return fid==='all';return m>=f.min&&m<f.max}
function gC(id){return CATS.find(c=>c.id===id)||CATS[CATS.length-1]}
function th(vid){return'https://img.youtube.com/vi/'+vid+'/mqdefault.jpg'}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function cById(id){return S.clips.find(c=>c.id===id)}

// API
// 클립 데이터 정규화 (시트에서 읽어온 값 + 캐시 값 보정)
function normClip(c){
  c.id=String(c.id||'').trim();
  c.videoId=String(c.videoId||'').trim();
  c.title=String(c.title||'').trim()||'제목 없음';
  c.url=String(c.url||'').trim();
  c.category=String(c.category||'etc').trim().toLowerCase();
  c.duration=cleanDuration(c.duration);
  return c;
}
function cleanDuration(val){
  if(!val||val==='undefined'||val==='null') return '';
  var d=String(val).trim();
  if(!d) return '';
  // "M:SS" → 정상
  if(d.match(/^\d{1,2}:\d{2}$/)) return d;
  // "H:MM:SS" → 검증
  var hms=d.match(/^(\d{1,3}):(\d{2}):(\d{2})$/);
  if(hms){
    var h=parseInt(hms[1]),m=parseInt(hms[2]),s=parseInt(hms[3]);
    var total=h*3600+m*60+s;
    // 2시간 이상이면 타임존 깨진 값 → 비우기
    // (교육 클립이 2시간 이상일 리 없음)
    if(total>7200) return '';
    if(h===0) return m+':'+(s<10?'0':'')+s;
    return d;
  }
  // "1899-12-29T..." ISO 날짜 문자열 (캐시 잔여)
  if(d.match(/^\d{4}-\d{2}-\d{2}/)){
    try{
      var dt=new Date(d);
      var ts=dt.getUTCHours()*3600+dt.getUTCMinutes()*60+dt.getUTCSeconds();
      if(ts>0&&ts<7200){
        var hh=Math.floor(ts/3600),mm=Math.floor((ts%3600)/60),ss=ts%60;
        return hh>0?hh+':'+(mm<10?'0':'')+mm+':'+(ss<10?'0':'')+ss:mm+':'+(ss<10?'0':'')+ss;
      }
    }catch{}
    return '';
  }
  // 숫자만 → 초
  if(d.match(/^\d+$/)){
    var sec=parseInt(d);
    if(sec>0&&sec<7200){
      var h2=Math.floor(sec/3600),m2=Math.floor((sec%3600)/60),s2=sec%60;
      return h2>0?h2+':'+(m2<10?'0':'')+m2+':'+(s2<10?'0':'')+s2:m2+':'+(s2<10?'0':'')+s2;
    }
    return '';
  }
  return d;
}

const CACHE_VER='v3';
const CACHE_KEY='ct_cache_'+CACHE_VER;
function saveCache(clips){try{localStorage.setItem(CACHE_KEY,JSON.stringify(clips))}catch{}}
function loadCache(){try{return JSON.parse(localStorage.getItem(CACHE_KEY)||'[]').map(normClip)}catch{return[]}}

async function apiGet(){
  if(!S.apiUrl)return[];
  try{
    const r=await fetch(S.apiUrl);
    const d=await r.json();
    const clips=(d.clips||[]).map(normClip);
    saveCache(clips); // 성공하면 캐시 갱신
    return clips;
  }catch(e){console.error(e);return null} // null = 네트워크 실패
}

async function apiPost(p){
  if(!S.apiUrl||S.demo){demoPost(p);return}
  // 낙관적 업데이트: 로컬에 먼저 반영
  if(p.action==='add'){S.clips.unshift(p.clip);saveCache(S.clips);renderAll()}
  else if(p.action==='addBulk'){S.clips=[...p.clips,...S.clips];saveCache(S.clips);renderAll()}
  else if(p.action==='delete'){S.clips=S.clips.filter(c=>c.id!==p.id);saveCache(S.clips);renderAll()}
  // 서버에 전송 (백그라운드)
  try{
    document.getElementById('sync-ind').classList.remove('hidden');
    await fetch(S.apiUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(p),redirect:'follow'});
    // 서버 동기화 (조용히)
    const fresh=await apiGet();
    if(fresh){S.clips=fresh;renderAll()}
    document.getElementById('sync-ind').classList.add('hidden');
  }catch(e){console.error(e);document.getElementById('sync-ind').classList.add('hidden')}
}
function demoPost(p){
  if(p.action==='add')S.clips.unshift(p.clip);
  else if(p.action==='addBulk')S.clips=[...p.clips,...S.clips];
  else if(p.action==='delete')S.clips=S.clips.filter(c=>c.id!==p.id);
  saveDC();renderAll();
}
function saveDC(){localStorage.setItem('ct_dc',JSON.stringify(S.clips))}
async function loadClips(){
  if(S.demo){
    try{S.clips=JSON.parse(localStorage.getItem('ct_dc')||'[]').map(normClip)}catch{S.clips=[]}
    renderAll();return;
  }
  // 1) 캐시에서 즉시 로드 (0ms)
  const cached=loadCache();
  if(cached.length>0){
    S.clips=cached;
    S.loading=false;
    renderAll();
    // 동기화 표시
    document.getElementById('sync-ind').classList.remove('hidden');
  } else {
    S.loading=true;
    renderAll();
  }
  // 2) 백그라운드에서 시트 동기화
  const fresh=await apiGet();
  document.getElementById('sync-ind').classList.add('hidden');
  if(fresh){
    S.clips=fresh;
    S.loading=false;
    renderAll();
  } else if(cached.length===0){
    S.loading=false;
    renderAll();
  }
}

function spinC(){
  const w=gW();const pool=S.clips.filter(c=>!w.has(c.id)&&(!S.pCat||c.category===S.pCat)&&mDur(c,S.pDur));
  if(!pool.length||S.pSpin)return;S.pSpin=true;S.pRes=null;renderAll();
  SFX.drumroll();
  const tot=18+Math.floor(Math.random()*8);
  let cnt=0;
  function step(){
    showSC(pool[Math.floor(Math.random()*pool.length)],true);
    SFX.tick(cnt);
    cnt++;
    if(cnt>=tot){
      S.pRes=pool[Math.floor(Math.random()*pool.length)];S.pSpin=false;
      SFX.win();renderAll();
    } else {
      const delay=cnt<tot-6?80:cnt<tot-3?160:cnt<tot-1?300:500;
      setTimeout(step,delay);
    }
  }
  step();
}

  h+='</div>';

  h+='<div class="aform"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h3>➕ 클립 추가</h3><button class="fbtn sec" id="btog" onclick="togBulk()" style="font-size:12px;padding:4px 12px">대량 입력</button></div>';
  h+='<div id="asng"><div class="frow"><input class="finp" id="a-url" placeholder="유튜브 URL 붙여넣기" onpaste="setTimeout(fetchM,100)"><button class="fbtn sec" onclick="fetchM()">제목·길이 가져오기</button></div><div class="frow"><input class="finp" id="a-ttl" placeholder="영상 제목 (자동으로 채워져요)"><input class="finp" id="a-dur" placeholder="길이 (자동입력)" style="max-width:120px"></div><div class="frow"><select class="fsel" id="a-cat">'+CATS.map(c=>'<option value="'+c.id+'">'+c.emoji+' '+c.name+'</option>').join('')+'</select><button class="fbtn pri" onclick="addC()">추가</button></div><div class="errmsg" id="a-err"></div></div>';
  h+='<div id="ablk" class="hidden"><textarea class="finp" id="b-txt" rows="5" placeholder="유튜브 URL을 한 줄에 하나씩" style="resize:vertical;margin-bottom:8px;width:100%"></textarea><div class="frow"><span style="font-size:13px;color:var(--muted)">카테고리:</span><select class="fsel" id="b-cat">'+CATS.map(c=>'<option value="'+c.id+'">'+c.emoji+' '+c.name+'</option>').join('')+'</select><button class="fbtn pri" onclick="addB()">일괄 추가</button></div></div></div>';

  h+='<div class="lctrls"><select class="fsel" onchange="S.mCat=this.value||null;renderAll()" style="font-size:12px;padding:6px 10px"><option value="">전체 카테고리</option>'+CATS.map(c=>'<option value="'+c.id+'"'+(mCat===c.id?' selected':'')+'>'+c.emoji+' '+c.name+'</option>').join('')+'</select>';
  h+='<select class="fsel" onchange="S.mW=this.value;renderAll()" style="font-size:12px;padding:6px 10px"><option value="all"'+(mW==='all'?' selected':'')+'>전체</option><option value="unwatched"'+(mW==='unwatched'?' selected':'')+'>안 본 것만</option><option value="watched"'+(mW==='watched'?' selected':'')+'>본 것만</option></select>';
  h+='<div style="flex:1"></div><button onclick="resetW()" style="background:none;border:1px solid var(--bg3);color:var(--dim);border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer">시청기록 전체 초기화</button><span style="font-size:12px;color:var(--dim)">'+f.length+'편</span></div>';

  if(!f.length)h+='<div class="empty"><span class="em">📭</span>클립이 없어요.</div>';
  else h+='<div style="display:flex;flex-direction:column;gap:8px">'+f.map(c=>rCard(c,{compact:true,del:true})).join('')+'</div>';
  el.innerHTML=h;
}

let bulkOn=false;
function togBulk(){bulkOn=!bulkOn;document.getElementById('asng').classList.toggle('hidden',bulkOn);document.getElementById('ablk').classList.toggle('hidden',!bulkOn);document.getElementById('btog').textContent=bulkOn?'단일 입력':'대량 입력'}

async function fetchM(){
  const url=document.getElementById('a-url').value.trim();const vid=exVid(url);const er=document.getElementById('a-err');
  if(!vid){er.textContent='유효한 유튜브 URL이 아니에요';return}
  er.innerHTML='<span class="lspin"></span>제목과 길이 가져오는 중...';
  let gotTitle=false,gotDur=false;
  // 1차: Apps Script meta 엔드포인트
  try{
    const apiBase=API_URL||S.apiUrl;
    if(apiBase&&apiBase!=='demo'){
      const r=await fetch(apiBase+'?action=meta&videoId='+vid);const d=await r.json();
      if(d.title&&!d.clips){document.getElementById('a-ttl').value=d.title;gotTitle=true}
      if(d.duration){document.getElementById('a-dur').value=d.duration;gotDur=true}
      // d.clips가 있으면 구버전 Apps Script → fallback
      if(d.clips){console.log('Apps Script 구버전 감지 → noembed fallback')}
    }
  }catch(e){console.log('meta endpoint error',e)}
  // 2차 fallback: noembed (제목만)
  if(!gotTitle){
    try{
      const r=await fetch('https://noembed.com/embed?url=https://www.youtube.com/watch?v='+vid);const d=await r.json();
      if(d.title){document.getElementById('a-ttl').value=d.title;gotTitle=true}
    }catch{}
  }
  // 결과 메시지
  if(gotTitle&&gotDur){
    er.innerHTML='<span style="color:var(--green)">✅ 제목 + 길이 자동 입력 완료!</span>';
  } else if(gotTitle&&!gotDur){
    er.innerHTML='✅ 제목 입력됨. <span style="color:var(--accent)">길이는 직접 입력해주세요.</span> <span style="font-size:11px;color:var(--dim)">(Apps Script 재배포 필요할 수 있음)</span>';
  } else if(!gotTitle&&gotDur){
    er.textContent='길이 입력됨. 제목을 직접 입력해주세요.';
  } else {
    er.textContent='정보를 가져올 수 없었어요. 직접 입력해주세요.';
  }
}

async function addC(){
  const url=document.getElementById('a-url').value.trim(),ttl=document.getElementById('a-ttl').value.trim(),dur=document.getElementById('a-dur').value.trim(),cat=document.getElementById('a-cat').value,er=document.getElementById('a-err');
  const vid=exVid(url);if(!vid){er.textContent='유효한 유튜브 URL을 입력하세요';return}
  if(S.clips.some(c=>c.videoId===vid)){er.textContent='이미 등록된 영상이에요!';return}
  await apiPost({action:'add',clip:{id:uid(),url,videoId:vid,title:ttl||'제목 없음',duration:dur,category:cat}});
  document.getElementById('a-url').value='';document.getElementById('a-ttl').value='';document.getElementById('a-dur').value='';er.textContent='';renderAll();
}

async function addB(){
  const txt=document.getElementById('b-txt').value,cat=document.getElementById('b-cat').value;
  const lines=txt.split('\n').map(l=>l.trim()).filter(Boolean);const nc=[];
  for(const l of lines){const vid=exVid(l);if(vid&&!S.clips.some(c=>c.videoId===vid)&&!nc.some(c=>c.videoId===vid))nc.push({id:uid(),url:l,videoId:vid,title:'불러오는 중...',duration:'',category:cat})}
  if(!nc.length)return;
  await apiPost({action:'addBulk',clips:nc});document.getElementById('b-txt').value='';
  for(const clip of nc){try{
    const apiBase=API_URL||S.apiUrl;
    if(apiBase&&apiBase!=='demo'){
      const r=await fetch(apiBase+'?action=meta&videoId='+clip.videoId);const d=await r.json();
      const fd=S.clips.find(c=>c.id===clip.id);
      if(fd){
        if(d.title)fd.title=d.title;
        if(d.duration)fd.duration=d.duration;
        fetch(apiBase,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'update',id:clip.id,title:d.title||fd.title,duration:d.duration||''}),redirect:'follow'}).catch(()=>{});
      }
    } else {
      const r=await fetch('https://noembed.com/embed?url=https://www.youtube.com/watch?v='+clip.videoId);const d=await r.json();
      if(d.title){const fd=S.clips.find(c=>c.id===clip.id);if(fd)fd.title=d.title}
    }
  }catch{}}
  if(S.demo)saveDC();renderAll();
}

async function delClip(id){if(!confirm('이 클립을 삭제할까요?'))return;await apiPost({action:'delete',id});renderAll()}

async function saveEdit(id){
  const ttl=document.getElementById('ed-ttl').value.trim();
  const dur=document.getElementById('ed-dur').value.trim();
  const cat=document.getElementById('ed-cat').value;
  if(!ttl){alert('제목을 입력하세요');return}
  // 로컬 즉시 반영
  const clip=S.clips.find(c=>c.id===id);
  if(clip){clip.title=ttl;clip.duration=dur;clip.category=cat}
  S.editId=null;
  saveCache(S.clips);
  renderAll();
  // 서버 업데이트 (백그라운드)
  const apiBase=API_URL||S.apiUrl;
  if(apiBase&&apiBase!=='demo'){
    try{
      document.getElementById('sync-ind').classList.remove('hidden');
      await fetch(apiBase,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'update',id:id,title:ttl,duration:dur,category:cat}),redirect:'follow'});
      document.getElementById('sync-ind').classList.add('hidden');
    }catch(e){console.error(e);document.getElementById('sync-ind').classList.add('hidden')}
  } else if(S.demo){saveDC()}
}
function resetW(){if(!confirm('모든 시청 기록을 초기화할까요?'))return;sW(new Set());renderAll()}

// ===== NAV & INIT =====
function switchV(v){S.view=v;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.v===v));document.querySelectorAll('.vp').forEach(p=>p.classList.toggle('hidden',p.id!=='v-'+v));renderAll()}
function renderAll(){
  const w=gW();document.getElementById('st-t').textContent=S.clips.length;document.getElementById('st-u').textContent=S.clips.filter(c=>!w.has(c.id)).length;
  document.getElementById('setup').classList.toggle('hidden',!!(S.apiUrl||S.demo));
  if(S.view==='theater')rTheater();else if(S.view==='pick')rPick();else if(S.view==='student')rStudent();else if(S.view==='manage')rManage();
}
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchV(b.dataset.v)));
if(S.apiUrl==='demo')S.demo=true;
if(S.apiUrl)loadClips();else renderAll();
</script>
